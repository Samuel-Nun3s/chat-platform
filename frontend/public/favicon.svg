<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a3d2c"/>
      <stop offset="100%" stop-color="#07090a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6dd5a7" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#6dd5a7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6dd5a7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" y1="-11" x2="0" y2="11" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5e5c7"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>
  <g transform="translate(16 16)" fill="url(#petal)">
    <ellipse cx="0" cy="0" rx="1.4" ry="10.5"/>
    <ellipse cx="0" cy="0" rx="1.4" ry="10.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="1.4" ry="10.5" transform="rotate(120)"/>
  </g>
  <circle cx="16" cy="16" r="1.8" fill="#0a0e0d"/>
</svg>
